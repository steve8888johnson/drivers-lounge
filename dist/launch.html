<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Launch Checklist | Drivers Lounge</title><link rel="icon" href="/assets/drivers-lounge-logo.png"><link rel="stylesheet" href="/assets/platform-v6.css"><link rel="stylesheet" href="/assets/rc1-design-system.css"><link rel="stylesheet" href="/assets/v1.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/config.js"></script><script src="/assets/backend.js"></script></head><body class="platform-body"><main class="auth-page"><section class="auth-grid"><div class="auth-card"><span class="page-kicker">GO-LIVE CONTROL</span><h1>Launch Checklist</h1><p>Complete these items before accepting production users.</p><div class="launch-checklist"><label><input type="checkbox"> <span><strong>Configure Supabase</strong><br>Enter the project URL and public anon key in <code>src/config.js</code>.</span></label><label><input type="checkbox"> <span><strong>Run database migrations</strong><br>Apply 005 and 006 in a development project, then review RLS policies.</span></label><label><input type="checkbox"> <span><strong>Set authentication URLs</strong><br>Add the Vercel production and preview domains in Supabase Auth settings.</span></label><label><input type="checkbox"> <span><strong>Test roles</strong><br>Create one driver, carrier, shipper, fleet and provider test account.</span></label><label><input type="checkbox"> <span><strong>Legal and privacy review</strong><br>Review data handling, disclaimers, petitions and marketplace terms.</span></label><label><input type="checkbox"> <span><strong>Live data labels</strong><br>Keep every demonstration record clearly marked until a provider is connected.</span></label></div></div><div class="auth-card"><span class="page-kicker">BACKEND STATUS</span><h2>Supabase-ready</h2><p class="backend-status" id="backend-state"><i></i><span>Checking configuration…</span></p><div class="account-data"><div class="account-row"><span>Authentication</span><strong>Email/password</strong></div><div class="account-row"><span>Storage mode</span><strong>Supabase or local fallback</strong></div><div class="account-row"><span>Build</span><strong>Static Node 22</strong></div><div class="account-row"><span>Release</span><strong>1.0 groundwork</strong></div></div><p><a class="primary-btn" href="/account">Test account flow</a></p></div></section><script>document.addEventListener('DOMContentLoaded',()=>{const e=document.querySelector('#backend-state');if(DLBackend.configured){e.classList.add('connected');e.querySelector('span').textContent='Supabase configured'}else e.querySelector('span').textContent='Local fallback mode — config.js is empty'});</script></main><script src="/assets/rc1-design-system.js"></script><script src="/assets/auth.js"></script></body></html>
