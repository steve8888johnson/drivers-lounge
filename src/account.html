<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Account | Drivers Lounge</title><link rel="icon" href="/assets/drivers-lounge-logo.png"><link rel="stylesheet" href="/assets/platform-v6.css"><link rel="stylesheet" href="/assets/rc1-design-system.css"><link rel="stylesheet" href="/assets/v1.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/config.js"></script><script src="/assets/backend.js"></script></head><body class="platform-body"><main class="auth-page"><div class="auth-grid"><section class="auth-card"><span class="page-kicker">DRIVER & BUSINESS ACCOUNTS</span><h1>Sign in</h1><div id="auth-message" class="auth-message info" hidden></div><form class="auth-form" id="login-form" data-guest-only><label>Email<input name="email" type="email" required autocomplete="email"></label><label>Password<input name="password" type="password" required autocomplete="current-password"></label><button>Sign in</button></form><div data-auth-only hidden><h2>Account</h2><div class="account-data"><div class="account-row"><span>Email</span><strong id="account-email"></strong></div><div class="account-row"><span>User ID</span><small id="account-id"></small></div></div><p><a class="primary-btn" href="/onboarding">Edit onboarding profile</a></p><button class="secondary-btn" data-signout>Sign out</button></div><hr style="border-color:#29475c;margin:20px 0"><form class="auth-form" id="reset-form" data-guest-only><h2>Reset password</h2><label>Email<input name="email" type="email" required></label><button type="submit">Send reset email</button></form></section><section class="auth-card" data-guest-only><span class="page-kicker">CREATE AN ACCOUNT</span><h2>Join Drivers Lounge</h2><form class="auth-form" id="signup-form"><label>Name<input name="name" required></label><label>Email<input name="email" type="email" required></label><label>Password<input name="password" type="password" minlength="8" required></label><label>Account type<select name="role"><option value="driver">Driver</option><option value="carrier">Carrier / Recruiter</option><option value="shipper">Shipper</option><option value="fleet">Fleet</option><option value="service_provider">Service provider</option></select></label><button>Create account</button></form><p style="color:#8fa4b3;font-size:11px">Email confirmation depends on your Supabase authentication settings.</p></section></div></main><script src="/assets/rc1-design-system.js"></script><script src="/assets/auth.js"></script></body></html>
