<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Create | Drivers Lounge</title><link rel="icon" href="/assets/drivers-lounge-logo.png"><link rel="stylesheet" href="/assets/platform-v6.css"><link rel="stylesheet" href="/assets/rc1-design-system.css"><link rel="stylesheet" href="/assets/v1.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/config.js"></script><script src="/assets/backend.js"></script></head><body class="platform-body"><main class="auth-page"><section class="auth-grid"><form class="auth-card auth-form" data-db-form="road_reports"><span class="page-kicker">ROAD REPORT</span><h2>Submit road intelligence</h2><label>Report type<select name="report_type"><option>Scale open</option><option>Scale closed</option><option>Parking full</option><option>Crash</option><option>Construction</option><option>High wind</option><option>Truck restriction</option></select></label><label>Latitude<input name="latitude" type="number" step="any"></label><label>Longitude<input name="longitude" type="number" step="any"></label><label>Note<textarea name="note"></textarea></label><button>Submit report</button></form><form class="auth-card auth-form" data-db-form="community_posts"><span class="page-kicker">COMMUNITY POST</span><h2>Create a driver post</h2><label>Room ID<input name="room_id" placeholder="Use after room creation"></label><label>Post<textarea name="body" required></textarea></label><button>Publish post</button></form><form class="auth-card auth-form" data-db-form="marketplace_listings"><span class="page-kicker">MARKETPLACE</span><h2>Create a listing</h2><label>Category<select name="category"><option>Truck</option><option>Trailer</option><option>Equipment</option><option>Business</option><option>Authority</option></select></label><label>Title<input name="title" required></label><label>Price<input name="price" type="number" step="0.01"></label><label>Status<select name="status"><option>draft</option><option>active</option></select></label><button>Save listing</button></form><form class="auth-card auth-form" data-db-form="pilot_car_jobs"><span class="page-kicker">PILOT CAR JOB</span><h2>Post escort work</h2><label>Origin<input name="origin" required></label><label>Destination<input name="destination" required></label><label>Escort type<input name="escort_type" placeholder="Lead, chase, high pole"></label><label>Load dimensions<input name="load_dimensions"></label><label>Pay<input name="pay" type="number"></label><button>Post job</button></form></section></main><script src="/assets/rc1-design-system.js"></script><script src="/assets/forms.js"></script></body></html>
